document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

           <div style=\"display:flex;align-items:center;gap:10px;\">\n                <button onclick=\"{{ decRest }}\" style=\"width:38px;height:38px;flex:none;border:1px solid #e3d8ea;background:#faf6fc;border-radius:11px;font-size:21px;font-weight:600;color:#b3228a;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;\">−<\u002Fbutton>\n                <div style=\"flex:1;height:38px;background:#faf3f8;border:1px solid #f0e2ec;border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600;color:#2c2530;white-space:nowrap;\">{{ restText }}<\u002Fdiv>\n                <button onclick=\"{{ incRest }}\" style=\"width:38px;height:38px;flex:none;border:1px solid #e3d8ea;background:#faf6fc;border-radius:11px;font-size:21px;font-weight:600;color:#b3228a;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;\">+<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isFast }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#faf3f8;border:1px solid #f0e2ec;border-left:4px solid #b3228a;border-radius:10px;padding:11px 14px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;color:#b3228a;margin-bottom:4px;\">SESIÓN RÁPIDA<\u002Fdiv>\n            <div style=\"font-size:12.5px;line-height:1.4;color:#564f5c;\">Contrae <strong>1 s<\u002Fstrong> y suelta <strong>1 s<\u002Fstrong>, sin mantener. Entrena la respuesta veloz del músculo.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"height:1px;background:#f0e8f4;\"><\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;gap:8px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n            <span style=\"font-size:13.5px;font-weight:700;\">Repeticiones<\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:#b3228a;\">{{ repsText }} / {{ targetText }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:5px;flex-wrap:wrap;\">\n            <sc-for list=\"{{ repDots }}\" as=\"d\" hint-placeholder-count=\"10\">\n              <div style=\"flex:1;min-width:14px;height:7px;border-radius:4px;background:{{ d.bg }};\"><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;gap:8px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n            <span style=\"font-size:13.5px;font-weight:700;\">Instrucciones de voz<\u002Fspan>\n            <button onclick=\"{{ toggleVoice }}\" style=\"display:flex;align-items:center;gap:8px;height:34px;padding:0 13px;border:1px solid {{ voiceBorder }};background:{{ voiceBg }};border-radius:9px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.04em;color:{{ voiceColor }};\">\n              <span style=\"width:8px;height:8px;border-radius:50%;background:{{ voiceDot }};display:inline-block;\"><\u002Fspan>{{ voiceLabel }}\n            <\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;gap:10px;\">\n          <button onclick=\"{{ toggle }}\" style=\"flex:1;height:46px;border:none;background:#b3228a;color:#fff;border-radius:12px;font-family:'Manrope',sans-serif;font-size:14.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;\">\n            <sc-if value=\"{{ playing }}\" hint-placeholder-val=\"{{ false }}\">\n              <svg width=\"13\" height=\"14\" viewBox=\"0 0 13 14\"><rect x=\"0\" y=\"0\" width=\"4\" height=\"14\" rx=\"1.3\" fill=\"#fff\"><\u002Frect><rect x=\"9\" y=\"0\" width=\"4\" height=\"14\" rx=\"1.3\" fill=\"#fff\"><\u002Frect><\u002Fsvg>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ paused }}\" hint-placeholder-val=\"{{ true }}\">\n              <svg width=\"13\" height=\"14\" viewBox=\"0 0 13 14\"><path d=\"M1 1 L12 7 L1 13 Z\" fill=\"#fff\"><\u002Fpath><\u002Fsvg>\n            <\u002Fsc-if>\n            {{ playLabel }}\n          <\u002Fbutton>\n          <button onclick=\"{{ reset }}\" style=\"width:46px;height:46px;flex:none;border:1px solid #e3d8ea;background:#fff;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;\" title=\"Reiniciar\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 18 18\" fill=\"none\" stroke=\"#6f6577\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 3.5 v3.5 h-3.5\"><\u002Fpath><path d=\"M14.5 7 A6 6 0 1 0 15.2 11\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ showScience }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;flex-direction:column;gap:10px;min-height:0;\">\n          <div style=\"background:#fff;border:1px solid #ece5f1;border-radius:14px;padding:12px 15px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;color:#b3228a;margin-bottom:5px;\">QUÉ TRABAJAS<\u002Fdiv>\n            <div style=\"font-size:12.5px;line-height:1.45;color:#564f5c;\">El suelo pélvico sostiene vejiga, útero y recto. Fortalecerlo mejora la continencia y el control.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #ece5f1;border-radius:14px;padding:12px 15px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;color:#b3228a;margin-bottom:5px;\">AISLA EL MÚSCULO<\u002Fdiv>\n            <div style=\"font-size:12.5px;line-height:1.45;color:#564f5c;\">No aprietes glúteos, abdomen ni muslos. Imagina que detienes el flujo de orina.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #ece5f1;border-radius:14px;padding:12px 15px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;color:#b3228a;margin-bottom:5px;\">RUTINA DIARIA<\u002Fdiv>\n            <div style=\"font-size:12.5px;line-height:1.45;color:#564f5c;\">Combina 10 contracciones sostenidas y 10 rápidas, 2 o 3 veces al día.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- INTRO OVERLAY -->\n  <sc-if value=\"{{ showIntro }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"position:absolute;inset:0;background:rgba(244,241,246,.82);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:40px;z-index:20;\">\n      <div style=\"background:#fff;border:1px solid #ece5f1;border-radius:22px;padding:36px 40px;max-width:700px;box-shadow:0 30px 70px rgba(124,23,105,.16);animation:kg-fade .4s ease both;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.2em;color:#b3228a;font-weight:500;\">ANTES DE EMPEZAR<\u002Fspan>\n        <h2 style=\"margin:10px 0 12px;font-size:27px;font-weight:800;letter-spacing:-.015em;line-height:1.15;\">Colócate y localiza el músculo<\u002Fh2>\n        <p style=\"margin:0 0 18px;font-size:15.5px;line-height:1.55;color:#564f5c;\">Túmbate boca arriba con las rodillas flexionadas y los pies apoyados. Identifica el suelo pélvico imaginando que detienes el flujo de orina, <strong>sin apretar glúteos ni abdomen<\u002Fstrong>. Al comenzar tendrás <strong>10 segundos para prepararte<\u002Fstrong> y una voz te guiará en cada fase.<\u002Fp>\n        <div style=\"display:flex;gap:10px;margin-bottom:16px;\">\n          <div style=\"flex:1;background:#faf3f8;border:1px solid #f0e2ec;border-radius:12px;padding:12px 14px;\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#b3228a;margin-bottom:3px;\">01<\u002Fdiv><div style=\"font-size:13.5px;font-weight:700;\">Contraer<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1;background:#faf3f8;border:1px solid #f0e2ec;border-radius:12px;padding:12px 14px;\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#b3228a;margin-bottom:3px;\">02<\u002Fdiv><div style=\"font-size:13.5px;font-weight:700;\">Mantener<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1;background:#faf3f8;border:1px solid #f0e2ec;border-radius:12px;padding:12px 14px;\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#b3228a;margin-bottom:3px;\">03<\u002Fdiv><div style=\"font-size:13.5px;font-weight:700;\">Relajar<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1;background:#faf3f8;border:1px solid #f0e2ec;border-radius:12px;padding:12px 14px;\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#b3228a;margin-bottom:3px;\">04<\u002Fdiv><div style=\"font-size:13.5px;font-weight:700;\">Descansar<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:0 0 22px;font-size:13px;line-height:1.5;color:#8a8092;font-family:'IBM Plex Mono',monospace;\">DOS SESIONES · Sostenidas (contracción larga) + Rápidas (contracción veloz)<\u002Fp>\n        <button onclick=\"{{ start }}\" style=\"height:50px;padding:0 32px;border:none;background:#b3228a;color:#fff;border-radius:13px;font-family:'Manrope',sans-serif;font-size:16px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:11px;\">\n          <svg width=\"13\" height=\"14\" viewBox=\"0 0 13 14\"><path d=\"M1 1 L12 7 L1 13 Z\" fill=\"#fff\"><\u002Fpath><\u002Fsvg>\n          Comenzar guía\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- DONE OVERLAY -->\n  <sc-if value=\"{{ done }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;inset:0;background:rgba(244,241,246,.85);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:40px;z-index:20;\">\n      <div style=\"background:#fff;border:1px solid #ece5f1;border-radius:22px;padding:40px 44px;text-align:center;max-width:480px;box-shadow:0 30px 70px rgba(124,23,105,.16);animation:kg-fade .4s ease both;\">\n        <div style=\"width:64px;height:64px;border-radius:50%;background:#eafaef;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;\">\n          <svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2f9e54\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 12.5 L9.5 18 L20 6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h2 style=\"margin:0 0 8px;font-size:26px;font-weight:800;\">Serie completada<\u002Fh2>\n        <p style=\"margin:0 0 24px;font-size:15px;line-height:1.5;color:#564f5c;\">Has completado {{ targetText }} repeticiones. Descansa, cambia de sesión o repite 2 o 3 veces al día.<\u002Fp>\n        <button onclick=\"{{ reset }}\" style=\"height:48px;padding:0 30px;border:none;background:#b3228a;color:#fff;border-radius:12px;font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;cursor:pointer;\">Repetir serie<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 720 },\n  &quot;prepSeconds&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 10, &quot;min&quot;: 0, &quot;max&quot;: 20, &quot;tsType&quot;: &quot;number&quot; },\n  &quot;defaultHold&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 3, &quot;min&quot;: 3, &quot;max&quot;: 10, &quot;tsType&quot;: &quot;number&quot; },\n  &quot;defaultRest&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 5, &quot;min&quot;: 2, &quot;max&quot;: 15, &quot;tsType&quot;: &quot;number&quot; },\n  &quot;targetReps&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 10, &quot;min&quot;: 1, &quot;max&quot;: 30, &quot;tsType&quot;: &quot;number&quot; },\n  &quot;voice&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; },\n  &quot;showScience&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    started: false, playing: false, done: false, preparing: false,\n    prepLeft: 0, phaseIndex: 0, phaseElapsed: 0,\n    holdSeconds: 5, restSeconds: 10, reps: 0,\n    session: 'slow', voice: true,\n    voices: [], voiceName: '',\n  };\n\n  RAMP = 2;   // Contraer / Relajar (sostenidas)\n  FAST = 1.0; // cada fase de la sesión rápida\n\n  phasesFor(session) {\n    if (session === 'fast') return [\n      { key: 'contraer', label: 'Contraer', color: '#b3228a', say: 'Aprieta', mini: 'Aprieta rápido y con fuerza', cue: 'Aprieta rápido y con fuerza.' },\n      { key: 'relajar',  label: 'Relajar',  color: '#c563a8', say: 'Suelta',  mini: 'Suelta de inmediato',        cue: 'Suelta de inmediato y por completo.' },\n    ];\n    return [\n      { key: 'contraer',  label: 'Contraer',  color: '#b3228a', say: 'Contrae con suavidad',      mini: 'Aprieta hacia dentro y arriba',     cue: 'Aprieta el suelo pélvico hacia dentro y arriba, como si quisieras cortar el flujo de orina.' },\n      { key: 'mantener',  label: 'Mantener',  color: '#7c1769', say: 'Mantén, y respira',         mini: 'Sostén la contracción sin soltar',  cue: 'Sostén la contracción sin soltar. Sigue respirando con normalidad, no aguantes el aire.' },\n      { key: 'relajar',   label: 'Relajar',   color: '#c563a8', say: 'Suelta, despacio',          mini: 'Suelta la tensión poco a poco',     cue: 'Suelta la contracción poco a poco hasta liberar toda la tensión.' },\n      { key: 'descansar', label: 'Descansar', color: '#9aa0a8', say: 'Descansa',                  mini: 'Relaja del todo antes de repetir',  cue: 'Relaja por completo. Prepárate para la siguiente repetición.' },\n    ];\n  }\n\n  prepDur() { return Math.max(0, this.props.prepSeconds != null ? this.props.prepSeconds : 10); }\n  target() { return Math.max(1, this.props.targetReps || 10); }\n\n  durFor(key) {\n    if (this.state.session === 'fast') return this.FAST;\n    if (key === 'mantener') return this.state.holdSeconds;\n    if (key === 'descansar') return this.state.restSeconds;\n    return this.RAMP;\n  }\n\n  componentDidMount() {\n    const dh = Math.max(3, Math.min(10, this.props.defaultHold || 3));\n    const dr = Math.max(2, Math.min(15, this.props.defaultRest || 5));\n    let saved = '';\n    try { saved = window.localStorage.getItem('kegel-voice') || ''; } catch (e) {}\n    this.setState({ holdSeconds: dh, restSeconds: dr, voice: this.props.voice !== false, voiceName: saved });\n    this.loadVoices();\n    try { window.speechSynthesis.onvoiceschanged = () => this.loadVoices(); } catch (e) {}\n    this.last = performance.now();\n    this.raf = requestAnimationFrame(this.tick);\n  }\n  componentWillUnmount() { cancelAnimationFrame(this.raf); this.cancelSpeak(); }\n\n  loadVoices() {\n    let vs = [];\n    try { vs = window.speechSynthesis.getVoices() || []; } catch (e) {}\n    const es = vs.filter(v => /^es/i.test(v.lang)).map(v => ({ name: v.name, lang: v.lang, label: v.name + ' · ' + v.lang }));\n    this.setState({ voices: es });\n  }\n\n  resolveVoice() { return this.pickVoice(); }\n\n  setVoiceByName = (e) => {\n    const name = e && e.target ? e.target.value : '';\n    try { window.localStorage.setItem('kegel-voice', name); } catch (err) {}\n    this.setState({ voiceName: name }, () => this.speak('Hola, soy tu guía. Respira hondo.', true));\n  };\n  testVoice = () => this.speak('Respira hondo, y relaja el suelo pélvico.', true);\n\n  pickVoice() {\n    let vs = [];\n    try { vs = window.speechSynthesis.getVoices() || []; } catch (e) { return null; }\n    const es = vs.filter(v => /^es/i.test(v.lang));\n    if (!es.length) return null;\n    // descarta voces masculinas conocidas para quedarnos con una voz femenina\n    const male = /(jorge|juan|diego|carlos|enrique|miguel|pablo|andrés|andres|male|hombre)/i;\n    const fem = es.filter(v => !male.test(v.name));\n    const pool = fem.length ? fem : es;\n    // voces femeninas españolas percibidas como suaves, por orden de preferencia\n    const prefer = ['paulina'];\n    for (const name of prefer) {\n      const m = pool.find(v => v.name.toLowerCase().includes(name));\n      if (m) return m;\n    }\n    return pool.find(v => /es[-_]ES/i.test(v.lang)) || pool[0];\n  }\n\n  speak(text, force) {\n    if ((!this.state.voice && !force) || !text) return;\n    try {\n      const u = new SpeechSynthesisUtterance(text);\n      u.lang = 'es-ES';\n      u.rate = this.state.session === 'fast' ? 0.95 : 0.78; // muy pausada, tono meditación\n      u.pitch = 1.12;  // femenina y cálida\n      u.volume = 0.8;  // suave\n      const v = this.resolveVoice();\n      if (v) u.voice = v;\n      window.speechSynthesis.cancel();\n      window.speechSynthesis.speak(u);\n    } catch (e) {}\n  }\n  cancelSpeak() { try { window.speechSynthesis.cancel(); } catch (e) {} }\n\n  tick = (now) => {\n    const dt = Math.min(0.05, (now - this.last) / 1000);\n    this.last = now;\n    if (this.state.playing && !this.state.done) {\n      if (this.state.preparing) this.advancePrep(dt);\n      else this.advance(dt);\n    }\n    this.raf = requestAnimationFrame(this.tick);\n  };\n\n  advancePrep(dt) {\n    const prepLeft = this.state.prepLeft - dt;\n    const prev = Math.ceil(this.state.prepLeft), now = Math.ceil(prepLeft);\n    if (now !== prev && now >= 1 && now <= 3) this.speak(String(now));\n    if (prepLeft <= 0) {\n      this.setState({ preparing: false, prepLeft: 0, phaseIndex: 0, phaseElapsed: 0 });\n      this.speak(this.phasesFor(this.state.session)[0].say);\n    } else {\n      this.setState({ prepLeft });\n    }\n  }\n\n  advance(dt) {\n    let { phaseIndex, phaseElapsed, reps, session } = this.state;\n    const phases = this.phasesFor(session);\n    phaseElapsed += dt;\n    const curKey = phases[phaseIndex].key;\n    if (phaseElapsed >= this.durFor(curKey)) {\n      phaseElapsed = 0;\n      phaseIndex++;\n      if (phaseIndex > phases.length - 1) {\n        phaseIndex = 0;\n        reps++;\n        if (reps >= this.target()) {\n          this.speak('Serie completada');\n          this.setState({ done: true, playing: false, reps, phaseIndex: 0, phaseElapsed: 0 });\n          return;\n        }\n      }\n      this.speak(phases[phaseIndex].say);\n    }\n    this.setState({ phaseIndex, phaseElapsed, reps });\n  }\n\n  begin() {\n    this.last = performance.now();\n    this.setState({ started: true, playing: true, done: false, preparing: true, prepLeft: this.prepDur(), phaseIndex: 0, phaseElapsed: 0, reps: 0 });\n    this.speak('Respira hondo y prepárate');\n  }\n  start = () => this.begin();\n  reset = () => this.begin();\n  toggle = () => {\n    if (this.state.done) return this.begin();\n    const np = !this.state.playing;\n    if (!np) this.cancelSpeak();\n    this.setState({ playing: np });\n  };\n  incHold = () => this.setState(s => ({ holdSeconds: Math.min(10, s.holdSeconds + 1) }));\n  decHold = () => this.setState(s => ({ holdSeconds: Math.max(3, s.holdSeconds - 1) }));\n  incRest = () => this.setState(s => ({ restSeconds: Math.min(15, s.restSeconds + 1) }));\n  decRest = () => this.setState(s => ({ restSeconds: Math.max(2, s.restSeconds - 1) }));\n  toggleVoice = () => this.setState(s => { if (s.voice) this.cancelSpeak(); return { voice: !s.voice }; });\n  selSlow = () => this.pickSession('slow');\n  selFast = () => this.pickSession('fast');\n  pickSession(sess) {\n    if (sess === this.state.session) return;\n    this.cancelSpeak();\n    this.last = performance.now();\n    const running = this.state.started && this.state.playing && !this.state.done;\n    this.setState({ session: sess, phaseIndex: 0, phaseElapsed: 0, reps: 0, done: false, preparing: running, prepLeft: running ? this.prepDur() : 0 },\n      () => { if (running) this.speak('Respira hondo y prepárate'); });\n  }\n\n  ease(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }\n\n  renderVals() {\n    const t = performance.now() / 1000;\n    const { started, playing, done, preparing, prepLeft, phaseIndex, phaseElapsed, holdSeconds, restSeconds, reps, session, voice } = this.state;\n    const phases = this.phasesFor(session);\n    const idx = Math.min(phaseIndex, phases.length - 1);\n    const phase = phases[idx];\n    const key = phase.key;\n    const active = started && !done && !preparing;\n    const dur = this.durFor(key);\n    const frac = Math.max(0, Math.min(1, phaseElapsed / dur));\n    const remaining = Math.max(0, dur - phaseElapsed);\n\n    let close = 0;\n    if (active) {\n      if (key === 'contraer') close = this.ease(frac);\n      else if (key === 'mantener') close = 1 - 0.05 * (0.5 - 0.5 * Math.cos(t * 4));\n      else if (key === 'relajar') close = 1 - this.ease(frac);\n      else close = 0;\n    }\n\n    const cx = 160, top = 80, bot = 240, H = bot - top;\n    const midGap = 38 - 27 * close, endGap = 17 - 10 * close;\n    const y1 = top + 0.34 * H, y2 = top + 0.66 * H;\n    const leftPath  = `M ${cx - endGap} ${top} C ${cx - midGap} ${y1} ${cx - midGap} ${y2} ${cx - endGap} ${bot}`;\n    const rightPath = `M ${cx + endGap} ${top} C ${cx + midGap} ${y1} ${cx + midGap} ${y2} ${cx + endGap} ${bot}`;\n    const bumpPath  = `M ${cx - endGap - 3} ${bot + 2} Q ${cx} ${bot - 22} ${cx + endGap + 3} ${bot + 2}`;\n\n    const arrows = [];\n    if (active) {\n      const inward = key === 'contraer' || key === 'mantener';\n      const outward = key === 'relajar';\n      if (inward || outward) {\n        const ys = key === 'mantener' ? [0] : [-58, 0, 58];\n        const baseOp = key === 'mantener' ? 0.6 : (key === 'contraer' ? Math.min(1, 0.4 + frac) : 0.9);\n        const wob = Math.sin(t * 4) * 3.5;\n        ys.forEach(yo => {\n          [-1, 1].forEach(side => {\n            const tipSign = inward ? -side : side;\n            const d = `M ${-tipSign * 8} -8 L ${tipSign * 8} 0 L ${-tipSign * 8} 8`;\n            const reach = inward ? (side * close * 9 + side * wob) : (side * wob);\n            const x = cx + side * 98 + reach;\n            arrows.push({ d, transform: `translate(${x},${160 + yo})`, opacity: baseOp });\n          });\n        });\n      }\n    }\n\n    let ringFrac = 0, ringColor = '#d9b9d0';\n    if (preparing) { ringFrac = (this.prepDur() - prepLeft) / Math.max(0.001, this.prepDur()); ringColor = '#b3228a'; }\n    else if (active) { ringFrac = frac; ringColor = phase.color; }\n    const ringOffset = 880 * (1 - ringFrac);\n\n    const tgt = this.target();\n    const repDots = [];\n    for (let i = 0; i < tgt; i++) repDots.push({ bg: i < reps ? '#b3228a' : '#ecdff0' });\n\n    const pad2 = n => ('0' + n).slice(-2);\n    const cycle = phases.map((p, i) => ({ num: pad2(i + 1), label: p.label, mini: p.mini, accent: (active && i === idx) ? p.color : '#ece5f1' }));\n    const isSlow = session === 'slow';\n\n    let phaseLabel, phaseColor, secondsText, cue, isMantener = false;\n    if (!started) { phaseLabel = 'Preparada'; phaseColor = '#b3228a'; secondsText = '—'; cue = 'Elige una sesión y pulsa Comenzar.'; }\n    else if (preparing) { phaseLabel = 'Prepárate'; phaseColor = '#b3228a'; secondsText = Math.ceil(prepLeft) + ' s'; cue = 'Colócate y respira hondo. La sesión empieza enseguida…'; }\n    else if (done) { phaseLabel = 'Hecho'; phaseColor = '#2f9e54'; secondsText = '✓'; cue = 'Serie completada.'; }\n    else { phaseLabel = phase.label; phaseColor = phase.color; secondsText = Math.ceil(remaining) + ' s'; cue = phase.cue; isMantener = key === 'mantener'; }\n\n    return {\n      showIntro: !started, done,\n      playing: started && playing && !done,\n      paused: !(started && playing && !done),\n      isMantener,\n      phaseLabel, phaseColor, secondsText, cue, ringColor,\n      leftPath, rightPath, bumpPath, arrows, ringOffset,\n      cycle, cycleLabel: isSlow ? 'EL CICLO · 4 FASES' : 'EL CICLO · 2 FASES',\n      isSlow, isFast: !isSlow,\n      tabSlowBg: isSlow ? '#ffffff' : 'transparent', tabSlowColor: isSlow ? '#b3228a' : '#8a8092',\n      tabFastBg: !isSlow ? '#ffffff' : 'transparent', tabFastColor: !isSlow ? '#b3228a' : '#8a8092',\n      holdText: holdSeconds + ' s', restText: restSeconds + ' s',\n      repsText: pad2(reps), targetText: pad2(tgt), repDots,\n      playLabel: (started && playing && !done) ? 'Pausar' : (done ? 'Repetir' : 'Continuar'),\n      showScience: this.props.showScience !== false,\n      voiceLabel: voice ? 'VOZ ACTIVA' : 'VOZ OFF',\n      voiceDot: voice ? '#2f9e54' : '#b9b2c0',\n      voiceBg: voice ? '#f0faf3' : '#f6f3f8',\n      voiceBorder: voice ? '#cfe8d8' : '#e6daec',\n      voiceColor: voice ? '#1f7a43' : '#8a8092',\n      voices: this.state.voices, hasVoices: this.state.voices.length > 0, voiceName: this.state.voiceName,\n      setVoiceByName: this.setVoiceByName, testVoice: this.testVoice,\n      start: this.start, reset: this.reset, toggle: this.toggle,\n      incHold: this.incHold, decHold: this.decHold, incRest: this.incRest, decRest: this.decRest,\n      toggleVoice: this.toggleVoice, selSlow: this.selSlow, selFast: this.selFast,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
