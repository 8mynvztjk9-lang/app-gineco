<!--
  login.html
  ----------
  Formulario de inicio de sesión para profesionales.
  Si hay un error (usuario/contraseña incorrectos), se muestra en rojo.
-->
{% extends "base.html" %}

{% block contenido %}
    <h1>Acceso para profesionales</h1>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="post" action="/login" class="formulario">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required>

        <button type="submit">Entrar</button>
    </form>

    <p class="ayuda">
        Datos de prueba — usuario: <code>medico</code> · contraseña: <code>clave1234</code>
    </p>
{% endblock %}
